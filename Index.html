<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Recovery Portal</title>

<style>
body{
    margin:0;
    padding:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:400px;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">
    <h1>Phone Recovery Service</h1>

    <p>Secure device recovery portal</p>

    <input type="text" placeholder="Enter recovery code">

    <button>Continue</button>

    <div class="footer">
        Protected & Secure
    </div>
</div>

</body>
</html>
